paths:
  /api/about:
    get:
      description: Get list of all active about sections
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.AboutSection'
                  type: array
              type: object
      summary: Get active about sections
      tags:
      - Public Content
  /api/admin/about:
    get:
      description: Get paginated list of all about sections
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.PaginatedResponse'
      security:
      - BearerAuth: []
      summary: Get all about sections for administration
      tags:
      - Admin About Sections
    post:
      consumes:
      - application/json
      description: Create an about section
      parameters:
      - description: Create About Section Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAboutSectionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
