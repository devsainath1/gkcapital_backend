                data:
                  $ref: '#/definitions/models.AboutSection'
              type: object
      security:
      - BearerAuth: []
      summary: Create a new about section
      tags:
      - Admin About Sections
  /api/admin/about/{id}:
    delete:
      description: Delete an about section by ID
      parameters:
      - description: About Section ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete an about section
      tags:
      - Admin About Sections
    put:
      consumes:
